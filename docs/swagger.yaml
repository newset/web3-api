basePath: /
definitions:
  model.NFT:
    properties:
      collection_name:
        example: CryptoPunks
        type: string
      contract_address:
        example: 0x1234...
        type: string
      image:
        example: https://img.cdn.example/1234.png
        type: string
      metadata:
        additionalProperties: true
        type: object
      name:
        example: 'CryptoPunk #1234'
        type: string
      token_id:
        example: "1234"
        type: string
    type: object
  model.NFTPage:
    properties:
      items:
        items:
          $ref: '#/definitions/model.NFT'
        type: array
      next_cursor:
        type: string
    type: object
  model.Response:
    properties:
      code:
        example: 0
        type: integer
      data: {}
      message:
        example: ok
        type: string
    type: object
  model.Token:
    properties:
      balance:
        example: "1000000"
        type: string
      contract_address:
        example: 0xdAC17F958D2ee523a2206206994597C13D831ec7
        type: string
      decimals:
        example: 6
        type: integer
      logo:
        example: https://logo.cdn.example/usdt.png
        type: string
      name:
        example: Tether USD
        type: string
      symbol:
        example: USDT
        type: string
      usd_value:
        example: "1000.00"
        type: string
    type: object
  model.TokenPage:
    properties:
      items:
        items:
          $ref: '#/definitions/model.Token'
        type: array
      next_cursor:
        type: string
    type: object
  model.Transaction:
    properties:
      block_number:
        example: 18000000
        type: integer
      from:
        example: 0x1234...
        type: string
      hash:
        example: 0xabc123...
        type: string
      status:
        example: success
        type: string
      timestamp:
        example: "2024-01-01T00:00:00Z"
        type: string
      to:
        example: 0x5678...
        type: string
      value:
        example: "1000000"
        type: string
    type: object
  model.TransactionPage:
    properties:
      items:
        items:
          $ref: '#/definitions/model.Transaction'
        type: array
      next_cursor:
        type: string
    type: object
  price.PriceInfo:
    properties:
      chain:
        example: eth
        type: string
      change_24h:
        example: "-1.25"
        type: string
      price:
        example: "1670.00"
        type: string
      symbol:
        example: ETH
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: 多链 Web3 数据查询服务，支持 ETH / BNB / Tron / Solana 代币、交易记录、NFT 查询。
  title: Web3 Multi-Chain Query API
  version: "1.0"
paths:
  /api/v1/chain/{chain}/nfts:
    get:
      consumes:
      - application/json
      description: 查询指定链上某个地址拥有的所有 NFT
      parameters:
      - description: '链名称 (主网: eth, bnb, tron, solana / 测试网: eth_sepolia, bnb_testnet,
          tron_shasta, solana_devnet)'
        enum:
        - eth
        - eth_sepolia
        - bnb
        - bnb_testnet
        - tron
        - tron_shasta
        - solana
        - solana_devnet
        in: path
        name: chain
        required: true
        type: string
      - description: 钱包地址
        in: query
        name: address
        required: true
        type: string
      - description: 分页游标
        in: query
        name: cursor
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/model.Response'
            - properties:
                data:
                  $ref: '#/definitions/model.NFTPage'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/model.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/model.Response'
      summary: 查询地址拥有的 NFT
      tags:
      - nfts
  /api/v1/chain/{chain}/price:
    get:
      consumes:
      - application/json
      description: 通过 Binance 获取指定链本币的实时 USD 价格
      parameters:
      - description: 链名称
        enum:
        - eth
        - eth_sepolia
        - bnb
        - bnb_testnet
        - tron
        - tron_shasta
        - solana
        - solana_devnet
        in: path
        name: chain
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/model.Response'
            - properties:
                data:
                  $ref: '#/definitions/price.PriceInfo'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/model.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/model.Response'
      summary: 查询本币 USD 价格
      tags:
      - price
  /api/v1/chain/{chain}/token/transactions:
    get:
      consumes:
      - application/json
      description: 查询指定链上某个地址针对特定代币的转账记录
      parameters:
      - description: '链名称 (主网: eth, bnb, tron, solana / 测试网: eth_sepolia, bnb_testnet,
          tron_shasta, solana_devnet)'
        enum:
        - eth
        - eth_sepolia
        - bnb
        - bnb_testnet
        - tron
        - tron_shasta
        - solana
        - solana_devnet
        in: path
        name: chain
        required: true
        type: string
      - description: 钱包地址
        in: query
        name: address
        required: true
        type: string
      - description: 代币合约地址
        in: query
        name: contract
        required: true
        type: string
      - description: 分页游标
        in: query
        name: cursor
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/model.Response'
            - properties:
                data:
                  $ref: '#/definitions/model.TransactionPage'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/model.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/model.Response'
      summary: 查询代币交易记录
      tags:
      - transactions
  /api/v1/chain/{chain}/tokens:
    get:
      consumes:
      - application/json
      description: 查询指定链上某个地址拥有的所有代币余额
      parameters:
      - description: '链名称 (主网: eth, bnb, tron, solana / 测试网: eth_sepolia, bnb_testnet,
          tron_shasta, solana_devnet)'
        enum:
        - eth
        - eth_sepolia
        - bnb
        - bnb_testnet
        - tron
        - tron_shasta
        - solana
        - solana_devnet
        in: path
        name: chain
        required: true
        type: string
      - description: 钱包地址
        in: query
        name: address
        required: true
        type: string
      - description: 分页游标
        in: query
        name: cursor
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/model.Response'
            - properties:
                data:
                  $ref: '#/definitions/model.TokenPage'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/model.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/model.Response'
      summary: 查询指定地址拥有的代币
      tags:
      - tokens
  /api/v1/chain/{chain}/transactions:
    get:
      consumes:
      - application/json
      description: 查询指定链上某个地址的本币（ETH/BNB/TRX/SOL）交易记录
      parameters:
      - description: '链名称 (主网: eth, bnb, tron, solana / 测试网: eth_sepolia, bnb_testnet,
          tron_shasta, solana_devnet)'
        enum:
        - eth
        - eth_sepolia
        - bnb
        - bnb_testnet
        - tron
        - tron_shasta
        - solana
        - solana_devnet
        in: path
        name: chain
        required: true
        type: string
      - description: 钱包地址
        in: query
        name: address
        required: true
        type: string
      - description: 分页游标
        in: query
        name: cursor
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/model.Response'
            - properties:
                data:
                  $ref: '#/definitions/model.TransactionPage'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/model.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/model.Response'
      summary: 查询本币交易记录
      tags:
      - transactions
  /api/v1/prices:
    get:
      consumes:
      - application/json
      description: 批量获取多个链本币的实时 USD 价格，不传 chains 则返回全部链
      parameters:
      - description: 逗号分隔的链名称，如 eth,bnb,tron,solana（为空则返回全部）
        in: query
        name: chains
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/model.Response'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/price.PriceInfo'
                  type: array
              type: object
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/model.Response'
      summary: 批量查询本币 USD 价格
      tags:
      - price
schemes:
- http
swagger: "2.0"
